services:
  - type: web
    name: task-master-api
    runtime: node
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # User will provide this in Render dashboard
      - key: EXPO_PUBLIC_API_URL
        sync: false # Not strictly needed for backend but keeps it consistent
